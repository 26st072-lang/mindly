<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindly - 모두의 한줄평</title>
    <style>
        /* 간단하고 깔끔한 스타일링 */
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .post-list { display: flex; flex-direction: column; gap: 10px; }
        .post-item { background: #f9f9f9; padding: 15px; border-left: 5px solid #4CAF50; border-radius: 4px; font-size: 16px; color: #444; word-break: break-all; }
        .post-time { font-size: 12px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 Mindly</h1>
    
    <div class="input-box">
        <input type="text" id="postInput" placeholder="다른 사람들과 공유할 생각을 적어보세요...">
        <button id="sendBtn">등록</button>
    </div>

    <div id="postList" class="post-list">
        </div>
</div>

<script type="module">
    // Firebase 필수 함수들 불러오기
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 보내주신 Firebase 설정 정보
    const firebaseConfig = {
        apiKey: "AIzaSyCizd6LH7CpVc9ngF1R7ozXbyxBC1iOqHU",
        authDomain: "mindly-87e6c.firebaseapp.com",
        projectId: "mindly-87e6c",
        storageBucket: "mindly-87e6c.firebasestorage.app",
        messagingSenderId: "8" // 잘린 부분은 그대로 두어도 프로젝트 ID 기반으로 동작합니다.
    };

    // Firebase 및 Firestore 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // HTML 요소 가져오기
    const postInput = document.getElementById('postInput');
    const sendBtn = document.getElementById('sendBtn');
    const postList = document.getElementById('postList');

    // 1. 데이터베이스에 글 저장하는 함수 (등록 버튼 클릭 시)
    sendBtn.addEventListener('click', async () => {
        const text = postInput.value.trim();
        if (text === "") {
            alert("내용을 입력해주세요!");
            return;
        }

        try {
            // 'posts'라는 이름의 컬렉션에 데이터 추가
            await addDoc(collection(db, "posts"), {
                content: text,
                createdAt: serverTimestamp() // 작성 서버 시간 기록
            });
            postInput.value = ""; // 입력창 비우기
        } catch (error) {
            console.error("글 저장 중 오류 발생: ", error);
        }
    });

    // 엔터키를 눌러도 등록되도록 설정
    postInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });

    // 2. 데이터베이스에서 실시간으로 글 목록 가져와서 보여주기
    // 최신 글이 위로 오도록 정렬(orderBy)하여 불러옵니다.
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    
    onSnapshot(q, (snapshot) => {
        postList.innerHTML = ""; // 기존 목록 초기화
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            
            // 날짜 포맷팅 (시간 정보가 아직 생성 안됐으면 현재 시간으로 임시 표시)
            const date = data.createdAt ? data.createdAt.toDate().toLocaleString('ko-KR') : new Date().toLocaleString('ko-KR');

            // 화면에 그려줄 HTML 태그 만들기
            const postItem = document.createElement('div');
            postItem.className = 'post-item';
            postItem.innerHTML = `
                <div>${data.content}</div>
                <div class="post-time">${date}</div>
            `;
            postList.appendChild(postItem);
        });
    });
</script>

</body>
</html>
